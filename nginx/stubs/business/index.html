<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Технические работы</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f5f5f5;
    font-family: Arial, sans-serif;
    color: #333;
  }
  .box {
    background: white;
    padding: 3rem 4rem;
    border-radius: 8px;
    box-shadow: 0 2px 20px rgba(0,0,0,0.08);
    text-align: center;
    max-width: 480px;
  }
  .icon { font-size: 4rem; margin-bottom: 1.5rem; }
  h1 { font-size: 1.8rem; margin-bottom: 0.75rem; color: #222; }
  p { color: #666; line-height: 1.6; }
  .contact { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #eee; font-size: 0.9rem; color: #999; }
</style>
</head>
<body>
<div class="box">
  <div class="icon">🔧</div>
  <h1>Технические работы</h1>
  <p>Сайт временно недоступен в связи с плановым обслуживанием. Мы скоро вернёмся!</p>
  <div class="contact">По вопросам: support@example.com</div>
</div>
</body>
</html>
