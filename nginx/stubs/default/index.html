<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    font-family: 'Segoe UI', sans-serif;
    color: #e0e0e0;
  }
  .container { text-align: center; padding: 2rem; }
  h1 { font-size: 3rem; font-weight: 300; letter-spacing: 0.1em; margin-bottom: 1rem; color: #a8edea; }
  p { font-size: 1.1rem; opacity: 0.7; margin-bottom: 2rem; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #a8edea; animation: pulse 1.5s infinite; }
  .dot:nth-child(2) { animation-delay: 0.3s; margin: 0 6px; }
  .dot:nth-child(3) { animation-delay: 0.6s; }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.8); } }
</style>
</head>
<body>
<div class="container">
  <h1>Welcome</h1>
  <p>Service is running</p>
  <span class="dot"></span>
  <span class="dot"></span>
  <span class="dot"></span>
</div>
</body>
</html>
