networks:
  singbox_net:
    driver: bridge

volumes:
  app_data:

services:

  # ── App (FastAPI + aiogram bot) ──────────────────────────────────────────────
  app:
    build: .
    container_name: singbox_app
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080"       # FastAPI / bot webhook
    volumes:
      - ./config/sing-box:/etc/sing-box       # shared with singbox container
      - ./nginx/templates:/app/nginx/templates
      - ./nginx/override:/var/www/override    # user-uploaded site
      - ./nginx/htpasswd:/etc/nginx/htpasswd  # basic auth for 401 fallback
      - ./nginx:/app/nginx
      - ./subs:/app/subs
      - ./nginx/logs:/app/nginx/logs:ro       # read nginx access logs
      - app_data:/app/data                    # SQLite database
      - /var/run/docker.sock:/var/run/docker.sock  # for docker exec singbox reload
    environment:
      - SINGBOX_CONFIG_PATH=/etc/sing-box/config.json
      - SINGBOX_CONTAINER=singbox_core
    networks:
      - singbox_net
    depends_on:
      - singbox

  # ── Sing-Box ─────────────────────────────────────────────────────────────────
  singbox:
    image: ghcr.io/sagernet/sing-box:latest
    container_name: singbox_core
    restart: unless-stopped
    volumes:
      - ./config/sing-box:/etc/sing-box:ro    # config written by app, read by singbox
    command: run -c /etc/sing-box/config.json
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    network_mode: host                        # need host network for VPN ports

  # ── AdGuard Home (optional, use --profile adguard) ───────────────────────────
  # Skip if you already have AdGuard or another DNS server on the host.
  adguard:
    profiles: [adguard]
    image: adguard/adguardhome:latest
    container_name: singbox_adguard
    restart: unless-stopped
    volumes:
      - ./data/adguard/work:/opt/adguardhome/work
      - ./data/adguard/conf:/opt/adguardhome/conf
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "3000:3000"   # AdGuard Web UI (proxied via Nginx)
    networks:
      - singbox_net

  # ── Nginx (optional, use --profile nginx) ─────────────────────────────────────
  # Skip if you already have Nginx installed on the host.
  nginx:
    profiles: [nginx]
    image: nginx:alpine
    container_name: singbox_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/override:/var/www/override:ro
      - ./nginx/htpasswd:/etc/nginx/htpasswd:ro
      - ./nginx/certs:/etc/letsencrypt:ro
      - ./web:/var/www/web:ro                 # serve web UI static files
      - ./nginx/logs:/var/log/nginx           # shared log dir (readable by app)
    networks:
      - singbox_net
    depends_on:
      - app
