networks:
  singbox_net:
    driver: bridge

volumes:
  singbox_config:
  adguard_data:
  nginx_certs:
  app_data:

services:

  # ── App (FastAPI + aiogram bot) ──────────────────────────────────────────────
  # No host ports — access only via nginx on 80/443 (masking, same as vpnbot).
  app:
    build: .
    container_name: singbox_app
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./config/sing-box:/etc/sing-box       # shared with singbox container
      - ./config/adguard:/app/config/adguard  # AdGuard bootstrap/password seeding
      - ./data:/app/host_data                 # ssh_port etc. — read by manage.sh on host
      - ./nginx/templates:/app/nginx/templates
      - ./nginx/override:/var/www/override    # user-uploaded site
      - ./nginx/htpasswd:/etc/nginx/htpasswd  # basic auth for 401 fallback
      - ./nginx:/app/nginx
      - ./subs:/app/subs
      - ./nginx/logs:/app/nginx/logs:ro       # Read nginx access logs
      - app_data:/app/data                    # SQLite database
      - /var/run/docker.sock:/var/run/docker.sock  # for docker exec singbox reload
    environment:
      - SINGBOX_CONFIG_PATH=/etc/sing-box/config.json
      - SINGBOX_CONTAINER=singbox_core
    networks:
      - singbox_net
    depends_on:
      - singbox
      - adguard

  # ── Sing-Box ─────────────────────────────────────────────────────────────────
  # Built from Dockerfile.singbox — pinned version, no ghcr.io dependency.
  # To upgrade: change SINGBOX_VERSION in Dockerfile.singbox, then `docker compose build singbox`.
  singbox:
    build:
      context: .
      dockerfile: Dockerfile.singbox
    container_name: singbox_core
    restart: unless-stopped
    volumes:
      - ./config/sing-box:/etc/sing-box:ro    # config written by app, read by singbox
    command: run -c /etc/sing-box/config.json
    cap_add:
      - NET_ADMIN
    network_mode: host                        # need host network for VPN
    # NOTE: net.ipv4.ip_forward must be enabled on the HOST, not here.
    # With network_mode: host the container shares the host's network namespace
    # and Docker cannot set sysctls on it. install.sh handles this automatically.
    # IMPORTANT: After changing config, app sends SIGHUP or restarts this container.

  # ── AdGuard Home ─────────────────────────────────────────────────────────────
  adguard:
    image: adguard/adguardhome:v0.107.52
    container_name: singbox_adguard
    restart: unless-stopped
    volumes:
      - adguard_data:/opt/adguardhome/work
      - ./config/adguard:/opt/adguardhome/conf   # pre-seeded AdGuardHome.yaml
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    # Web UI only via nginx at secret path (no 3000 on host, same as vpnbot)
    networks:
      - singbox_net

  # ── Nginx ─────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: singbox_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/override:/var/www/override:ro
      - ./nginx/htpasswd:/etc/nginx/htpasswd:ro
      - ./nginx/certs:/etc/letsencrypt:ro
      - ./web:/var/www/web:ro                 # Serve web UI
      - ./nginx/logs:/var/log/nginx           # Shared log dir (readable by app)
    networks:
      - singbox_net
    depends_on:
      - app
